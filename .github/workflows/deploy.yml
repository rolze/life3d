name: Build & Deploy to production

on:
  push:
    branches:
      - master  # or your production branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: life26/package-lock.json  # adjust if needed

      - name: Install dependencies
        run: npm ci
        working-directory: life26  # adjust to your app subfolder

      - name: Build
        run: npm run build
        working-directory: life26

      - name: Deploy via FTP (sync + delete old files)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./life26/dist/
          server-dir: /
          dangerous-clean-slate: true  # ⚠️ deletes all remote files before upload
